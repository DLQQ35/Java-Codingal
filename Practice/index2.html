<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Music Grid with Glassmorphic Floating Dock</title>
    <style>
        /* Reset & Base Canvas Elements */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px 20px 180px 20px;
            /* Generous bottom padding so grid items clear the dock */
        }

        /* Top Section Styling */
        header {
            max-width: 600px;
            margin: 20px auto 24px auto;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #1d1d1f;
        }

        header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1d1d1f;
            margin-top: 24px;
        }

        /* Album Grid System */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .album-card {
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .grid-art {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            margin-bottom: 8px;
            transition: transform 0.2s ease;
        }

        .album-card:hover .grid-art {
            transform: scale(1.02);
        }

        .grid-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #1d1d1f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .grid-artist {
            font-size: 0.8rem;
            color: #86868b;
            margin-top: 2px;
        }

        /* Fixed Interface Container (Anchored at viewport bottom) */
        .dock-fixed-layer {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 999;
        }

        /* Component 1: Floating Mini Audio Player Bar */
        .audio-player-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-radius: 20px;

            /* Apple Ultra-transparent Specular look */
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);

            /* Intense background sampling variables */
            backdrop-filter: blur(30px) saturate(220%);
            -webkit-backdrop-filter: blur(30px) saturate(220%);
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .album-art-thumb {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .meta-text h4 {
            font-size: 0.9rem;
            color: #1d1d1f;
            font-weight: 600;
        }

        .meta-text p {
            font-size: 0.75rem;
            color: #515154;
        }

        .player-controls {
            display: flex;
            gap: 22px;
            align-items: center;
            padding-right: 10px;
        }

        .control-icon {
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .control-icon:hover {
            opacity: 0.6;
        }

        /* Component 2: Main System Navigation Dock */
        .main-tab-bar {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px;
            border-radius: 26px;

            /* Distinct nesting layer depth */
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.02);

            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: #86868b;
            font-size: 0.65rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .tab-item.active {
            color: #ff2d55;
            /* System UI primary color channel */
        }
    </style>
</head>

<body>

    <!-- Scrollable Application Workspace -->
    <header>
        <h1>Listen Now</h1>
        <h2>Feel Good</h2>
    </header>

    <main class="album-grid">
        <!-- Album 1 -->
        <div class="album-card">
            <img class="grid-art" src="https://unsplash.com" alt="Album Cover">
            <div class="grid-title">What Not To Do</div>
            <div class="grid-artist">Twin Shadow</div>
        </div>
        <!-- Album 2 -->
        <div class="album-card">
            <img class="grid-art" src="https://unsplash.com" alt="Album Cover">
            <div class="grid-title">Like A Ribbon</div>
            <div class="grid-artist">John Glacier</div>
        </div>
        <!-- Album 3 -->
        <div class="album-card">
            <img class="grid-art" src="https://unsplash.com" alt="Album Cover">
            <div class="grid-title">All Of Me</div>
            <div class="grid-artist">Nao</div>
        </div>
        <!-- Album 4 -->
        <div class="album-card">
            <img class="grid-art" src="https://unsplash.com" alt="Album Cover">
            <div class="grid-title">As I Said Before</div>
            <div class="grid-artist">Selena</div>
        </div>
        <!-- Album 5 -->
        <div class="album-card">
            <img class="grid-art" src="https://unsplash.com" alt="Album Cover">
            <div class="grid-title">Electric Nights</div>
            <div class="grid-artist">Neon Horizon</div>
        </div>
        <!-- Album 6 -->
        <div class="album-card">
            <img class="grid-art" src="https://unsplash.com" alt="Album Cover">
            <div class="grid-title">Subliminal Audio</div>
            <div class="grid-artist">Deep State</div>
        </div>
    </main>

    <!-- Anchored UI System Dock Layer -->
    <div class="dock-fixed-layer">

        <!-- Audio Floating Bar -->
        <div class="audio-player-bar">
            <div class="track-info">
                <img class="album-art-thumb" src="https://unsplash.com" alt="Nao thumb">
                <div class="meta-text">
                    <h4>All Of Me</h4>
                    <p>Nao</p>
                </div>
            </div>
            <div class="player-controls">
                <!-- Play Arrow Graphic -->
                <svg class="control-icon" width="16" height="16" viewBox="0 0 24 24" fill="#000">
                    <path d="M8 5v14l11-7z" />
                </svg>
                <!-- Next Track Graphic -->
                <svg class="control-icon" width="18" height="18" viewBox="0 0 24 24" fill="#000">
                    <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z" />
                </svg>
            </div>
        </div>

        <!-- Navigation Tab Bar -->
        <nav class="main-tab-bar">
            <a class="tab-item active">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
                <span>Home</span>
            </a>
            <a class="tab-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z" />
                </svg>
                <span>New</span>
            </a>
            <a class="tab-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L12 15v5c.34-.02.67-.04 1-.07z" />
                </svg>
                <span>Radio</span>
            </a>
            <a class="tab-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
                </svg>
                <span>Library</span>
            </a>
        </nav>

    </div>

</body>

</html>
