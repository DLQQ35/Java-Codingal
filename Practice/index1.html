<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass Navigation</title>
  <style>
    /* Reset & Core Setup */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0b071a 0%, #15002b 40%, #00122c 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient moving background elements to showcase glass refraction */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      z-index: 1;
      opacity: 0.7;
    }
    .orb-1 {
      top: -100px;
      left: 20%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(147, 51, 234, 0.5) 0%, transparent 70%);
      animation: drift 15s infinite alternate ease-in-out;
    }
    .orb-2 {
      top: 100px;
      right: 15%;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.4) 0%, transparent 70%);
      animation: drift 12s infinite alternate-reverse ease-in-out;
    }

    /* Navigation Structural Layout */
    header {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 1200px;
      z-index: 100;
    }

    .liquid-nav {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      border-radius: 20px;
      
      /* Base glassmorphism properties */
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    /* The Engine: Distorted border wrapper using the SVG filter */
    .liquid-nav::before {
      content: '';
      position: absolute;
      top: -8px;
      left: -8px;
      right: -8px;
      bottom: -8px;
      background: inherit;
      border-radius: inherit;
      filter: url(#nav-refraction) blur(2px);
      z-index: -1;
      pointer-events: none;
      opacity: 0.95;
    }

    /* Branding */
    .logo {
      color: #fff;
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.5px;
      text-decoration: none;
    }

    /* Menu Links */
    .nav-links {
      display: flex;
      list-style: none;
      gap: 32px;
      align-items: center;
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.75);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s ease;
      position: relative;
    }

    .nav-links a:hover {
      color: #fff;
    }

    /* Liquid Glass Call-To-Action Button */
    .nav-btn {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    /* Dropdown Component Setup */
    .dropdown {
      position: relative;
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 20px);
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      width: 200px;
      padding: 12px;
      list-style: none;
      border-radius: 16px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      
      /* Mirroring the fluid glass effect onto the submenu layout */
      background: rgba(20, 15, 35, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .dropdown-menu::before {
      content: '';
      position: absolute;
      top: -5px; left: -5px; right: -5px; bottom: -5px;
      background: inherit;
      border-radius: inherit;
      filter: url(#nav-refraction) blur(1px);
      z-index: -1;
    }

    .dropdown:hover .dropdown-menu {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .dropdown-menu a {
      display: block;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .dropdown-menu a:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    /* Core backdrop animations */
    @keyframes drift {
      0% { transform: translate(-10%, -10%) rotate(0deg); }
      100% { transform: translate(10%, 15%) rotate(360deg); }
    }

    /* Simple Content Section to test scrolling opacity balance */
    .hero-content {
      padding: 200px 20px 100px;
      text-align: center;
      color: #fff;
      position: relative;
      z-index: 5;
    }

    .hero-content h2 {
      font-size: 3.5rem;
      margin-bottom: 16px;
      background: linear-gradient(to right, #fff, #9333ea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>

  <!-- Background visuals for the warp mechanics -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Main Navigation Block -->
  <header>
    <nav class="liquid-nav">
      <a href="#" class="logo">AURA.ui</a>
      
      <ul class="nav-links">
        <li><a href="#">Overview</a></li>
        <li class="dropdown">
          <a href="#">Products ▼</a>
          <ul class="dropdown-menu">
            <li><a href="#">Ecosystem</a></li>
            <li><a href="#">Web Hosting</a></li>
            <li><a href="#">Integrations</a></li>
          </ul>
        </li>
        <li><a href="#">Pricing</a></li>
        <li><a href="#" class="nav-btn">Get Started</a></li>
      </ul>
    </nav>
  </header>

  <!-- Dummy Body Context -->
  <main class="hero-content">
    <h2>Refractive Web Architecture</h2>
    <p>Scroll down to inspect how background text block layers pass and bend organically through the navigation container borders.</p>
  </main>

  <!-- Clean, linear SVG displacement map designed for wide horizontal assets -->
  <svg xmlns="http://w3.org" style="display: none;">
    <defs>
      <filter id="nav-refraction">
        <!-- Slight increase in tightness parameters protects horizontal text alignment while warping perimeter lines -->
        <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="22" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

</body>
</html>
